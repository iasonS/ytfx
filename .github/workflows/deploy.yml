name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check Render Deploy Hook URL
        if: secrets.RENDER_DEPLOY_HOOK_URL == ''
        run: |
          echo "ERROR: RENDER_DEPLOY_HOOK_URL secret not configured"
          echo "1. Go to Render dashboard → Settings → Deploy Hook"
          echo "2. Copy the webhook URL"
          echo "3. Run: gh secret set RENDER_DEPLOY_HOOK_URL --body 'YOUR_URL'"
          exit 1

      - name: Trigger Render deployment
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
